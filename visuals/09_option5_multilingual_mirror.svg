<text x="844.275" y="58" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">Meenakshi, 67 — rural Tamil Nadu, never attended school</text>
<text x="844.2749999999999" y="134" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">App auto-selects Tamil — audio-only, no reading needed</text>
<text x="844.275" y="210" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Culturally grounded AI assessment begins</text>
<text x="231.17499999999995" y="286" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Memory — story about local coconut seller Murugan</text>
<text x="637.5249999999999" y="286" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Orientation — which festival is coming next month</text>
<text x="1011.7" y="286" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Reasoning — Tamil proverb interpretation</text>
<text x="1360.85" y="286" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Speech sample — tell me about your morning</text>
<text x="815.675" y="362" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">Multilingual LLM Analysis Engine</text>
<text x="402.17499999999995" y="438" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Semantic accuracy — did she recall correctly</text>
<text x="815.675" y="438" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Linguistic complexity — sentence structure, word finding</text>
<text x="1189.85" y="438" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Response latency — pause patterns</text>
<text x="844.2749999999999" y="514" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">Multi-dimensional Cognitive Profile</text>
<text x="844.2749999999999" y="590" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Compared to Tamil women aged 65-70 — education-matched norms</text>
<text x="844.2749999999999" y="666" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">Personalised score — not one-size-fits-all</text>
