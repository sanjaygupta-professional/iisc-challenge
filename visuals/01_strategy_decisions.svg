<text x="302.675" y="58" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">Q1 — What is the goal?</text>
<text x="302.675" y="134" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Build something REAL — swing hard</text>
<text x="302.675" y="210" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Q2 — What skills does the team have?</text>
<text x="302.675" y="286" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">LLMs and GenAI — Strong. Architecture — Strong. Clinical — Recruiting</text>
<text x="302.675" y="362" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Q3 — Proposal or working model?</text>
<text x="302.675" y="438" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">PROPOSAL ONLY — May 20 deadline — 24 days</text>
<text x="302.675" y="514" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Q4 — Who are the primary users?</text>
<text x="302.675" y="590" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">ASHA workers Level C and MBBS doctors Level B</text>
<text x="302.675" y="666" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Q5 — What data inputs are realistic?</text>
<text x="302.675" y="742" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Record-assisted intake — missing data is acceptable</text>
<text x="302.675" y="818" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Q6 — What is Indias unique advantage?</text>
<text x="302.675" y="894" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">Frugal AI forces innovation. ASHA flywheel. 22 languages.</text>
<text x="302.675" y="970" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">VISION — BharatBrain: India-first, No-MRI, ASHA-deployed, LLM-native</text>
</svg>