<text x="1122.525" y="58" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">5 — EXCEPTIONAL — First-of-its-kind, no comparable work exists</text>
<text x="1122.525" y="134" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">4 — STRONG — Well above average, minor gaps only</text>
<text x="1122.525" y="210" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">3 — ADEQUATE — Meets requirements, nothing stands out</text>
<text x="1122.525" y="286" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">2 — WEAK — Below average, identifiable fixable gaps</text>
<text x="1122.525" y="362" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">1 — POOR — Fails the criterion, fundamental problem</text>
<text x="1122.525" y="438" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">Score Interpretation</text>
<text x="224.025" y="514" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">85 to 100 — Outstanding — Lead with this option</text>
<text x="658.975" y="514" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">70 to 84 — Strong — Credible, targeted strengthening needed</text>
<text x="1122.525" y="514" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">55 to 69 — Moderate — Viable but needs significant work</text>
<text x="1571.775" y="514" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">40 to 54 — Weak — Consider combining with higher scorer</text>
<text x="1967.4" y="514" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">Below 40 — Not recommended as standalone</text>
</svg>