<polyline points="1348.9375000000002,76 1348.9375000000002,96 1568.2,96 1568.2,116" fill="none" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#arrowhead)" />
<polyline points="1348.9375000000002,76 1348.9375000000002,96 2035.325,96 2035.325,116" fill="none" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#arrowhead)" />
<polyline points="1348.9375000000002,76 1348.9375000000002,96 2516.75,96 2516.75,116" fill="none" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#arrowhead)" />
<rect x="1164.9125000000001" y="40" width="368.05" height="36" rx="0" ry="0" fill="#2C3E50" stroke="var(--_node-stroke)" stroke-width="0.75" />
<rect x="40" y="116" width="396.65000000000003" height="36" rx="0" ry="0" fill="#7aa2f7" stroke="var(--_node-stroke)" stroke-width="0.75" />
<rect x="460.6500000000001" y="116" width="432.40000000000003" height="36" rx="0" ry="0" fill="#9ece6a" stroke="var(--_node-stroke)" stroke-width="0.75" />
