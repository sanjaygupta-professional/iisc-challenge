<rect x="2300.55" y="116" width="432.40000000000003" height="36" rx="0" ry="0" fill="#73daca" stroke="var(--_node-stroke)" stroke-width="0.75" />
<text x="1348.9375000000002" y="58" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#a9b1d6">INDIAS UNIQUE EDGE — for Alzheimers AI Research</text>
<text x="238.32500000000002" y="134" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">SCALE — 1.4B people, 8.8M dementia, 80% undiagnosed</text>
<text x="676.8500000000001" y="134" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">INFRASTRUCTURE — 1M+ ASHA workers, PHC network, ABHA IDs</text>
<text x="1129.6750000000002" y="134" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">DATA — SANSCOG rural + TLSA urban, 10-year longitudinal</text>
<text x="1568.2" y="134" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">FRUGAL INNOVATION — No MRI forces novel architecture</text>
<text x="2035.3249999999998" y="134" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">LANGUAGE — 22 official languages, no native LLM cognitive tests</text>
<text x="2516.75" y="134" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">T2D NEXUS — 101M diabetics, HbA1c available at PHC level</text>
</svg>